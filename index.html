<!DOCTYPE html>
<html>
  <head>
    <title>Geolocation</title>
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no" />
    <meta charset="utf-8" />
    <script src="js/pandasuite-bridge-4.2.1.min.js"></script>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      #map {
        height: 100%;
      }
      #description {
        font-family: Roboto;
        font-size: 15px;
        font-weight: 300;
      }

      #infowindow-content .title {
        font-weight: bold;
      }

      #infowindow-content {
        display: none;
      }

      #map #infowindow-content {
        display: inline;
      }

      .pac-card {
        margin: 10px 10px 0 0;
        border-radius: 2px 0 0 2px;
        box-sizing: border-box;
        -moz-box-sizing: border-box;
        outline: none;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        background-color: #fff;
        font-family: Roboto;
      }

      #pac-container {
        padding-bottom: 12px;
        margin-right: 12px;
      }

      .pac-controls {
        display: inline-block;
        padding: 5px 11px;
      }

      .pac-controls label {
        font-family: Roboto;
        font-size: 13px;
        font-weight: 300;
      }

      #pac-input {
        background-color: #fff;
        font-family: Roboto;
        font-size: 15px;
        font-weight: 300;
        margin-left: 12px;
        padding: 0 11px 0 13px;
        text-overflow: ellipsis;
        width: 400px;
      }

      #pac-input:focus {
        border-color: #4d90fe;
      }

      #title {
        color: #fff;
        background-color: #4d90fe;
        font-size: 25px;
        font-weight: 500;
        padding: 6px 12px;
      }
      #target {
        width: 345px;
      }
    </style>
  </head>
  <body>
    <input
      id="pac-input"
      class="controls"
      type="text"
      placeholder="Search Box"
      style="display: none"
    />
    <div id="map"></div>
    <script>
      let map = null;
      let marker = null;
      let circle = null;
      let initialMarker;

      let properties = null;
      let markers = null;

      function convertMarkers(markersArray) {
        let updated = false;

        const convertedMarkers = markersArray.map((m) => {
          if (
            m.hasOwnProperty("lat") &&
            m.hasOwnProperty("lng") &&
            !m.hasOwnProperty("center")
          ) {
            updated = true;
            const { lat, lng, ...rest } = m;
            return {
              ...rest,
              center: { lat: parseFloat(lat), lng: parseFloat(lng) },
            };
          }
          return m;
        });

        if (updated && PandaBridge.isStudio) {
          PandaBridge.send(PandaBridge.UPDATED, { markers: convertedMarkers });
        }

        return convertedMarkers;
      }

      PandaBridge.init(function () {
        PandaBridge.onLoad(function (pandaData) {
          properties = pandaData.properties;
          markers = pandaData.markers;

          markers = convertMarkers(markers);

          if (PandaBridge.isStudio) {
            const script = document.createElement("script");
            script.setAttribute(
              "src",
              "https://maps.googleapis.com/maps/api/js?callback=initMap" +
                (properties.apiKey
                  ? "&libraries=places&key=" + properties.apiKey
                  : ""),
            );
            document.getElementsByTagName("head")[0].appendChild(script);
            if (properties.apiKey) {
              document.getElementById("pac-input").style.display = "inline";
            }
          } else {
            initGeolocation();
          }
        });

        PandaBridge.onUpdate(function (pandaData) {
          properties = pandaData.properties;
          markers = convertMarkers(pandaData.markers);
        });

        PandaBridge.getSnapshotData(function () {
          if (marker != null) {
            return {
              center: {
                lat: marker.getPosition().lat(),
                lng: marker.getPosition().lng(),
              },
              radius: circle.getRadius(),
            };
          }
          return null;
        });

        PandaBridge.setSnapshotData(function (pandaData) {
          if (map != null) {
            addMarker(pandaData.data?.center);
            circle.setRadius(pandaData.data?.radius);
          } else {
            initialMarker = pandaData.data;
          }
        });
      });

      function initMap() {
        map = new google.maps.Map(document.getElementById("map"), {
          center: { lat: 48.864051319607476, lng: 2.3559504747390747 },
          zoom: 18,
        });

        if (initialMarker) {
          addMarker(initialMarker.center);
          circle.setRadius(initialMarker.radius);
        }
        PandaBridge.send(PandaBridge.INITIALIZED);

        map.addListener("click", function (event) {
          addMarker(event.latLng);
        });

        if (PandaBridge.isStudio) {
          const input = document.getElementById("pac-input");
          const searchBox = new google.maps.places.SearchBox(input);
          map.controls[google.maps.ControlPosition.TOP_LEFT].push(input);

          map.addListener("bounds_changed", function () {
            searchBox.setBounds(map.getBounds());
          });

          searchBox.addListener("places_changed", function () {
            const places = searchBox.getPlaces();

            if (places.length == 0) {
              return;
            }

            const bounds = places[0].geometry.location;
            addMarker(bounds);
            map.fitBounds(bounds);
          });
        }

        initGeolocation();
      }

      function initGeolocation() {
        if (navigator.geolocation) {
          navigator.geolocation.watchPosition(
            function (position) {
              const pos = {
                lat: position.coords.latitude,
                lng: position.coords.longitude,
                coord: {
                  type: "Coord",
                  value: {
                    lat: position.coords.latitude,
                    lng: position.coords.longitude,
                  },
                },
              };

              markers.forEach(function (m) {
                const markerIsInRadius =
                  getHaversineDistance(pos.coord.value, m.center) <
                  (m.radius || properties.detectionDistance);
                if (
                  (markerIsInRadius && !m.enter && !m.exit) ||
                  (markerIsInRadius && m.enter && !m.oldPosInRadius) ||
                  (!markerIsInRadius && m.exit && m.oldPosInRadius)
                ) {
                  PandaBridge.send(PandaBridge.TRIGGER_MARKER, m.id);
                }
                m.oldPosInRadius = markerIsInRadius;
              });
              PandaBridge.send(PandaBridge.UPDATED, { queryable: pos });
            },
            function (e) {
              console.warn(e);
              if (e.code == 3) {
                initGeolocation();
              } else {
                handleLocationError(true);
              }
            },
            { enableHighAccuracy: true, maximumAge: 1000, timeout: 10000 },
          );
        } else {
          handleLocationError(false);
        }
      }

      function addMarker(location) {
        if (marker) {
          marker.setMap(null);
          circle.setMap(null);
        }

        marker = new google.maps.Marker({
          position: location,
          map: map,
        });
        map.setCenter(location);

        circle = new google.maps.Circle({
          strokeColor: "#FF0000",
          strokeOpacity: 0.8,
          strokeWeight: 2,
          fillColor: "#FF0000",
          fillOpacity: 0.35,
          map: map,
          center: location,
          radius: location.radius || properties.detectionDistance,
        });
      }

      function handleLocationError(browserHasGeolocation) {
        PandaBridge.send("locationError");
      }

      function getHaversineDistance(p1, p2) {
        const R = 6371;
        const dLat = toRadian(parseFloat(p2.lat) - parseFloat(p1.lat));
        const dLong = toRadian(parseFloat(p2.lng) - parseFloat(p1.lng));

        const a =
          Math.sin(dLat / 2) * Math.sin(dLat / 2) +
          Math.cos(toRadian(parseFloat(p1.lat))) *
            Math.cos(toRadian(parseFloat(p2.lat))) *
            Math.sin(dLong / 2) *
            Math.sin(dLong / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        const d = R * c;

        return d * 1000;
      }

      function toRadian(x) {
        return (x * Math.PI) / 180;
      }
    </script>
  </body>
</html>
